apiVersion: 1

datasources:
  - name: PostgreSQL Analytics
    uid: postgres_analytics

    type: postgres
    access: proxy
    url: postgres_analytics:5432
    
    #user: ${ANL_POSTGRES_USER}
    user: analytics
    
    secureJsonData:
      #password: ${ANL_POSTGRES_PASSWORD}
      password: analytics

    jsonData:
      database: analytics_db
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false

    isDefault: true

    editable: true